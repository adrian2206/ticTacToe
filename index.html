<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <script src="javascript.js" defer></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container" id="container">
        <div class="player-info" id="player-info">
            <div class="score" id="score"></div>
        </div>
        <div class="game-board" id="game-board"></div>
        <div class="button-container">
            <button id="new-match" type="submit">New Match</button>
            <button id="new-game" type="submit">New Game</button>
        </div>
        <dialog class="name-input" id="name-input">
            <div class="modal-container">
                <p>Choose players:</p>
                <form>
                    <div>
                        <label for="player1">First Player</label>
                        <input id="player1" type="text" name="name1" required>
                    </div>
                    <div>
                        <label for="player2">Second Player</label>
                        <input type="text" id="player2" name="name2" required>
                    </div>
                    <div>
                        <button type="reset" id="close-modal" disabled>Cancel</button>
                        <button type="submit" id="submit" value="default" disabled>Submit</button>
                    </div>
                </form>
            </div>
        </dialog>
    </div>
</body>
</html>
